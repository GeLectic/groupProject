<svg xmlns="http://www.w3.org/2000/svg" width="1700" height="840" viewBox="0 0 1700 840" role="img" aria-labelledby="title desc">
  <title id="title">WanderMind Interview Style Architecture</title>
  <desc id="desc">Interview-focused architecture diagram showing client, backend services, data stores, external providers, and secure request lifecycle.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f9f5ed"/>
      <stop offset="100%" stop-color="#efe4d2"/>
    </linearGradient>

    <linearGradient id="lane1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fffdf8"/>
      <stop offset="100%" stop-color="#fff3df"/>
    </linearGradient>

    <linearGradient id="lane2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f8fff9"/>
      <stop offset="100%" stop-color="#e9f8ee"/>
    </linearGradient>

    <linearGradient id="lane3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f7fbff"/>
      <stop offset="100%" stop-color="#e9f3ff"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#8f7b5a" flood-opacity="0.23"/>
    </filter>

    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 z" fill="#6f5a37"/>
    </marker>

    <style>
      .title { font: 700 38px 'Segoe UI', Arial, sans-serif; fill: #2c2317; }
      .subtitle { font: 500 18px 'Segoe UI', Arial, sans-serif; fill: #5c492d; }
      .laneTitle { font: 700 22px 'Segoe UI', Arial, sans-serif; fill: #2f2618; }
      .boxTitle { font: 700 15px 'Segoe UI', Arial, sans-serif; fill: #2c2418; }
      .txt { font: 500 12px 'Segoe UI', Arial, sans-serif; fill: #4e3f2b; }
      .hint { font: 600 11px 'Segoe UI', Arial, sans-serif; fill: #6b5737; }
      .stroke { stroke: #b69b6e; stroke-width: 1.4; }
      .inner { stroke: #c7b18c; stroke-width: 1.1; }
      .flow { stroke: #6f5a37; stroke-width: 2.3; fill: none; marker-end: url(#arrow); }
      .flowDashed { stroke: #8c7650; stroke-width: 1.9; fill: none; marker-end: url(#arrow); stroke-dasharray: 6 4; }
    </style>
  </defs>

  <rect x="0" y="0" width="1700" height="840" fill="url(#bg)"/>

  <text class="title" x="850" y="58" text-anchor="middle">WanderMind Interview Architecture</text>
  <text class="subtitle" x="850" y="88" text-anchor="middle">How to explain the system in 2-3 minutes: secure auth, RAG pipeline, SQL persistence, and user lifecycle</text>

  <!-- Lanes -->
  <rect x="40" y="120" width="520" height="700" rx="20" fill="url(#lane1)" class="stroke" filter="url(#shadow)"/>
  <rect x="590" y="120" width="560" height="700" rx="20" fill="url(#lane2)" class="stroke" filter="url(#shadow)"/>
  <rect x="1180" y="120" width="480" height="700" rx="20" fill="url(#lane3)" class="stroke" filter="url(#shadow)"/>

  <text class="laneTitle" x="70" y="155">1) Client Layer</text>
  <text class="laneTitle" x="620" y="155">2) API + Orchestration Layer</text>
  <text class="laneTitle" x="1210" y="155">3) Data + Providers Layer</text>

  <!-- Client boxes -->
  <rect x="70" y="180" width="460" height="110" rx="12" fill="#fff8eb" class="inner"/>
  <text class="boxTitle" x="88" y="204">React Frontend (Vite + Zustand + Framer Motion)</text>
  <text class="txt" x="88" y="225">- AuthPanel: register/login + token restore</text>
  <text class="txt" x="88" y="244">- InputForm: destination, duration, month, style</text>
  <text class="txt" x="88" y="263">- Itinerary UI: day cards, hotels, tips, hidden gems</text>

  <rect x="70" y="310" width="460" height="110" rx="12" fill="#fff8eb" class="inner"/>
  <text class="boxTitle" x="88" y="334">Session Controls</text>
  <text class="txt" x="88" y="355">- JWT in localStorage (Authorization bearer)</text>
  <text class="txt" x="88" y="374">- Sidebar history from SQL via /api/itineraries</text>
  <text class="txt" x="88" y="393">- Delete itinerary / clear history / delete account</text>

  <rect x="70" y="440" width="460" height="140" rx="12" fill="#fff8eb" class="inner"/>
  <text class="boxTitle" x="88" y="464">Realtime UX via SSE</text>
  <text class="txt" x="88" y="485">- POST /api/generate-itinerary returns event stream</text>
  <text class="txt" x="88" y="504">- progress events update animated timeline</text>
  <text class="txt" x="88" y="523">- result event hydrates final itinerary</text>
  <text class="txt" x="88" y="542">- error event handled with resilient UI fallbacks</text>
  <text class="hint" x="88" y="564">Interview line: "We avoid polling and render each stage progressively."</text>

  <rect x="70" y="600" width="460" height="190" rx="12" fill="#fff8eb" class="inner"/>
  <text class="boxTitle" x="88" y="624">Security + UX Guardrails</text>
  <text class="txt" x="88" y="645">- Protected routes are API-protected (not just UI-hidden)</text>
  <text class="txt" x="88" y="664">- Account delete requires password confirmation</text>
  <text class="txt" x="88" y="683">- Logout clears token + in-memory state + local cache</text>
  <text class="txt" x="88" y="702">- Export PDF handled by authenticated backend endpoint</text>
  <text class="hint" x="88" y="724">Interview line: "Frontend is stateless for trust-critical actions."</text>

  <!-- API/orchestration boxes -->
  <rect x="620" y="180" width="500" height="95" rx="12" fill="#f2fff4" class="inner"/>
  <text class="boxTitle" x="638" y="204">Auth API (FastAPI)</text>
  <text class="txt" x="638" y="225">- /api/auth/register, /login, /me, DELETE /me</text>
  <text class="txt" x="638" y="244">- bcrypt hashing + JWT signing + bearer validation</text>

  <rect x="620" y="292" width="500" height="95" rx="12" fill="#f2fff4" class="inner"/>
  <text class="boxTitle" x="638" y="316">History API</text>
  <text class="txt" x="638" y="337">- /api/itineraries GET, DELETE item, DELETE all</text>
  <text class="txt" x="638" y="356">- user-scoped SQL access via authenticated user id</text>

  <rect x="620" y="404" width="500" height="160" rx="12" fill="#f2fff4" class="inner"/>
  <text class="boxTitle" x="638" y="428">Generation Orchestrator (main.py)</text>
  <text class="txt" x="638" y="449">- Stage 1: collect source signals (YouTube + community)</text>
  <text class="txt" x="638" y="468">- Stage 2: verification + retrieval contexts</text>
  <text class="txt" x="638" y="487">- Stage 3: LLM generation + assembly</text>
  <text class="txt" x="638" y="506">- Stage 4: persist final itinerary row in PostgreSQL</text>
  <text class="txt" x="638" y="525">- stream final result to client via SSE</text>
  <text class="hint" x="638" y="547">Interview line: "SSE keeps the user informed during long-running pipeline work."</text>

  <rect x="620" y="582" width="242" height="208" rx="12" fill="#f2fff4" class="inner"/>
  <text class="boxTitle" x="638" y="606">RAG Subsystem</text>
  <text class="txt" x="638" y="627">- chunk summarization</text>
  <text class="txt" x="638" y="646">- sentence embeddings</text>
  <text class="txt" x="638" y="665">- FAISS index build/load</text>
  <text class="txt" x="638" y="684">- context retrieval</text>
  <text class="txt" x="638" y="703">- conflict verification</text>

  <rect x="878" y="582" width="242" height="208" rx="12" fill="#f2fff4" class="inner"/>
  <text class="boxTitle" x="896" y="606">Output Subsystem</text>
  <text class="txt" x="896" y="627">- itinerary generator</text>
  <text class="txt" x="896" y="646">- hotels + tips synthesis</text>
  <text class="txt" x="896" y="665">- response normalization</text>
  <text class="txt" x="896" y="684">- PDF exporter endpoint</text>
  <text class="txt" x="896" y="703">- error resilience + fallbacks</text>

  <!-- Data/provider boxes -->
  <rect x="1210" y="180" width="420" height="120" rx="12" fill="#f1f8ff" class="inner"/>
  <text class="boxTitle" x="1228" y="204">PostgreSQL</text>
  <text class="txt" x="1228" y="225">- users table (email, hash, created_at)</text>
  <text class="txt" x="1228" y="244">- itineraries table (JSON payload + metadata)</text>
  <text class="txt" x="1228" y="263">- cascade account deletion support</text>

  <rect x="1210" y="320" width="420" height="95" rx="12" fill="#f1f8ff" class="inner"/>
  <text class="boxTitle" x="1228" y="344">FAISS Index Store</text>
  <text class="txt" x="1228" y="365">- destination-wise index and metadata</text>
  <text class="txt" x="1228" y="384">- reused for faster repeat generations</text>

  <rect x="1210" y="435" width="200" height="150" rx="12" fill="#f1f8ff" class="inner"/>
  <text class="boxTitle" x="1228" y="459">External Content</text>
  <text class="txt" x="1228" y="480">- YouTube</text>
  <text class="txt" x="1228" y="499">- Reddit</text>
  <text class="txt" x="1228" y="518">- Quora</text>
  <text class="txt" x="1228" y="537">- Tavily enrichment</text>

  <rect x="1430" y="435" width="200" height="150" rx="12" fill="#f1f8ff" class="inner"/>
  <text class="boxTitle" x="1448" y="459">AI Providers</text>
  <text class="txt" x="1448" y="480">- Groq LLM calls</text>
  <text class="txt" x="1448" y="499">- embeddings model</text>
  <text class="txt" x="1448" y="518">- verification prompts</text>
  <text class="txt" x="1448" y="537">- itinerary synthesis</text>

  <rect x="1210" y="605" width="420" height="185" rx="12" fill="#f1f8ff" class="inner"/>
  <text class="boxTitle" x="1228" y="629">Interview Talking Points (Non-Functional)</text>
  <text class="txt" x="1228" y="650">- Security: bearer auth + hashed credentials</text>
  <text class="txt" x="1228" y="669">- Reliability: fallback chunks and guarded API retries</text>
  <text class="txt" x="1228" y="688">- Performance: cache reuse + bounded expensive steps</text>
  <text class="txt" x="1228" y="707">- UX: progressive SSE stages for transparency</text>
  <text class="txt" x="1228" y="726">- Data lifecycle: per-user ownership + account deletion</text>

  <!-- Core flow arrows -->
  <path class="flow" d="M530 235 C570 235, 580 228, 620 228"/>
  <path class="flow" d="M530 365 C570 365, 580 340, 620 340"/>
  <path class="flow" d="M530 500 C570 500, 580 480, 620 480"/>
  <path class="flow" d="M530 695 C570 695, 580 228, 620 228"/>

  <path class="flow" d="M1120 228 C1160 228, 1170 240, 1210 240"/>
  <path class="flow" d="M1120 340 C1160 340, 1170 240, 1210 240"/>
  <path class="flow" d="M1120 480 C1160 480, 1170 500, 1210 500"/>
  <path class="flow" d="M1120 635 C1160 635, 1170 368, 1210 368"/>

  <path class="flowDashed" d="M1410 510 C1420 510, 1420 510, 1430 510"/>
  <path class="flowDashed" d="M1530 585 C1530 600, 1460 600, 1460 605"/>
</svg>
